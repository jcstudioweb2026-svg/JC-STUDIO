const temas = [

{
titulo:"INTRODUCCIÓN",

contenido:`
Las Doctrinas fundamentales son indispensables para la salvación, de manera que no obedecerlas afecta seriamente nuestra relación con Dios y la esperanza de vida eterna.
El término Doctrina proviene del latín “doctrina” que significa enseńanza para instrucción.
En el Antiguo Testamento proviene de la palabra“Legah” que quiere decir lo recibido.

En el Nuevo Testamento viene de la palabra “Didaje” que significa enseńanza e instrucción.

En resumen, la doctrina es un cuerpo de enseńanza aceptado por un grupo significativo de personas.

Con relación a la importancia de la doctrina en la formación del creyente, se entiende que toda práctica cristiana está sujeta a lo que enseńa la Palabra de Dios.

La enseńanza correcta del pensamiento de Dios se transforma en la plomada que medirá la rectitud del edificio de Dios y de la formación de la iglesia. 
Cualquier desviación de la correcta enseńanza traerá como consecuencia una
 separación significativa en el tiempo de las verdades establecidas por Dios. 
(2 Timoteo 2:15)

La fuente de este  conocimiento es Dios y su palabra como dice el texto: "Escudrińad las escrituras; por que a vosotros os parece que en ellas teneis la vida eterna; y ellas son las que dan testimonio de mi" (Juan 5:39).

La biblia revela los principios por los cuales Dios nos juzga. Por lo tanto es, y continuara siendo hasta el fin del mundo, el verdadero centro de la unidad de Los cristianos y la regla suprema que aprueba la conducta humana, los credos y las opiniones religiosas.
La biblia es la autoridad suprema en todo asunto de fe y debe ser interpretada bajo la dirección del Espíritu Santo.


`
},

{
titulo:"LA FE",

contenido:`
Definición Etimológica:

La palabra fe viene del hebreo “aman” que quiere decir estar firme, ser estable y digno de confianza.

Tiene la fuerte connotación de fidelidad y veracidad.

Del griego “pistis” que significa creencia,firme persuasión o convicción basada en lo que se escucha. También significa confianza.

El concepto fe es posiblemente el único que la Biblia define de una manera académica.

żQué es fe?

Es la confianza cierta de que algo que queremos sucederá.
Es la certeza de que eso que esperamos está esperándonos,aunque no podamos verlo.

Hebreos 11:1
“Es, pues, la fe la certeza de lo que se espera, la convicción de lo que no se ve.”
Y sin fe es imposible agradar a Dios. Porque es necesario que el que se acerca a Dios crea que Él existe y que recompensa a los que le buscan.

IMPORTANCIA DE LA FE

Sin fe es imposible agradar a Dios. Todo el que desea acercarse a Dios debe creer que Él existe y que recompensa a quienes lo buscan sinceramente.

Hebreos 11:6 dice “Porque sin fe es imposible agradar a Dios”. Lo contrario de esta premisa es “con fe es posible agradar a Dios”.

El texto hace alusión a la capacidad que tiene el hombre para creer y menciona que los que creen tienen la posibilidad de agradar a Dios.
El solo hecho de creer o tener fe no asegura que el hombre agrade a Dios.

Según este verso es necesaria la creencia en la existencia de Dios y en su bondad para tener la posibilidad de agradar a Dios. Es una consideración lógica y razonable ya que quien no crea que Dios existe mucho menos intentará agradarle; ni tampoco creerá que sea bueno un ser que no existe.

La fe es imprescindible, porque sin ella es completamente imposible vivir, ya que es el camino que Dios uso, para revelar su justicia en el evangelio.
 
”Porque en el evangelio la justicia de Dios se revela por fe y para fe, como está escrito: Mas el justo por la fe  vivirá”. (Romanos 1:17).
 “Por fe” se refiere al instrumento a través del cual se revela la justicia de Dios; es el medio que Dios utiliza para que el hombre conozca su justicia.

- “Para fe” Se entiende como un conocimiento aprehendido, la doctrina revelada; un propósito al que se debe llegar.

 ACEPCIONES DE LA FE
Romanos 1 contiene 3 acepciones de la fe:

1)La fe como la capacidad de creer (La dotación que Dios da para creer, el libre 
albedrio)
2) La fe como el contenido de lo que se cree (La doctrina)
 
3) “Amados, por la gran solicitud que tenía de escribiros acerca de nuestra común salvación, me ha sido necesario escribiros exhortándoos que contendáis 
ardientemente por la fe que ha sido una vez dada a los santos”

(Efesios 4:5) un Seńor, una fe, un bautismo.

(Romanos 3:26) con la mira de manifestar en este tiempo su justicia, a fin de que él sea el justo, y el que justifica al que es de la fe de Jesús.

(Romanos 12:3) Digo, pues, por la gracia que me es dada, a cada cual que está entre vosotros, que no tenga más alto concepto de sí que el que debe tener, sino que piense de sí con cordura, conforme a la medida de fe que Dios repartió a cada uno.

(Apocalipsis 14:12) Aquí está la paciencia de los santos , los que guardan los 
mandamientos de Dios y la fe de Jesús.

4) La fe como un estilo de vida, fidelidad y confianza (Aplica lo que cree) 
(Mateo 9:2) Y sucedió que le trajeron un paralítico, tendido sobre una cama; y al ver Jesús la fe de ellos, dijo al paralítico: Ten ánimo, hijo; tus pecados te son perdonados.

LA CAPACIDAD DE CREER EN DIOS COMO CAMINO HACIA LA SALVACIÓN

En (Romanos 1:20) dice que la existencia de Dios se puede descubrir por medio de las cosas creadas, "de modo que no tienen excusa". Esta consideración lleva a concluir que el solo contemplar la naturaleza permite descubrir la existencia de Dios. Y que esta fe primaria es válida delante de Dios como instrumento 
que encamine al hombre a la salvación.

Veamos algunos textos que afirman que el hombre tiene la capacidad de creer a la verdad revelada, asentir intelectualmente, obedecer sus requisitos y poner confianza en la persona de la revelación.
 
(Romanos 10:11 -14.)
10) "Porque con el corazón se cree para justicia, y con la boca se confiesa para 
salvación.

11) Pues la Escritura dice: "todo el que cree en el no será avergonzado.”

12) Porque no hay distinción entre judío y griego, pues el mismo Seńor es Seńor de todos, abundando en riquezas para todos los que Le invocan;

13) porque: "todo aquel que invoque el nombre del seńor será salvo.”

14) żCómo, pues, invocarán a Aquél en quien no han creído? żY cómo creerán en Aquél de quien no han oído? żY cómo oirán sin haber quien les predique?”

Donde hay fe, hay voluntad de actuar. Hebreos 11:17. "Por la fe Abraham, cuando fue probado, ofreció a Isaac; y el que había recibido las promesas ofrecía su unigénito"

 LA NATURALEZA DE LA FE
La fe tiene una peculiaridad y es que es solo un instrumento; cobra vida o se pierde, dependiendo de su objeto.Una fe es viva si su objeto es Dios; pero si el objeto es el hombre, la Biblia dice que “maldito el hombre que confía en el brazo del hombre”. También dice que si ponemos nuestra fe en Cristo resucitado y Cristo no resucitó, nuestra fe es vana.

De esta consideración surgen dos posiciones muy antagónicas en el mundo religioso, a saber: 
-la oportunidad universal o la predestinación selectiva.Si asumimos que todos tienen fe entonces creemos que cualquier hombre puede ser salvo sin importar raza, cultura o clase social.

  LA FE POR SI SOLA NO SALVA
El mero hecho de estar convencidos de lo que no vemos no lo hace real o porque esperemos algo de hecho nos acontecerá. Los orientales perciben la fe como la capacidad que el hombre tiene de, por medio de su convicción interna, hacer que las cosas sucedan. Le llaman a esto “el poder del pensamiento positivo”. 
A partir de esta concepción desarrollan toda una forma de vida. La filosofía oriental está orientada a alimentar el ego del hombre quien está convencido que por su fuerza mental, que se traduce en convicción, lo puede conseguir todo. Esto es tener fe en la fe. Concebida esta como una fuerza con vida por sí.

 COMO SE ADQUIERE LA FE
La Biblia afirma que el hombre tiene la capacidad de creer “fe” y que dependiendo de cómo la ejerza o donde la ponga hará la diferencia en los resultados. żLa fe es innata o se recibe? Si la fe es innata, 
todos tenemos fe y por tanto tenemos la posibilidad de creer en Dios. Si la fe se recibe entonces solo pueden creer aquellos a quienes se les haya dado.

Los animales viven por instintos, no tienen espiritualidad, solo el hombre tiene la capacidad y la posibilidad de creer, es el hombre quien decide creer o no creer. 
Esta consideración la encontramos en varios pasajes de las sagradas Escrituras:

(Hebreos. 4:2) “Porque en verdad, a nosotros se nos ha anunciado las buenas nuevas, como también a ellos. Pero la palabra que ellos oyeron no les aprovechó por no ir acompańada (mezclada) por la fe en los que la oyeron.

(Romanos 10:13-14) porque: "todo aquel que invoque el nombre del seńor será salvo." żCómo, pues, invocarán a Aquél en quien no han creído? żY cómo creerán en Aquél de quien no han oído? żYcómo oirán sin haber quien les predique?

(Romanos 10:16-17) Pero no todos obedecen al Evangelio; pues Isaías dice: Seńor, żquién ha creído a nuestro anuncio? Luego la fe es por el oír; y el oír, por la palabra del Cristo.

Es obvio, al leer estas escrituras, que aquí se está hablando de creer en aquel que es anunciado, en quien no se puede creer sino se ha oído de Él. Porque como dice: żCómo creerán en aquel de quien no han oído? 

El anuncio no les hizo creer sino que les dio la posibilidad de poner su fe en él.

(2Ş Timoteo 2: 21) "Así que, si alguno se limpia de Estas cosas, será instrumento para honra, santificado, útil al Seńor, y dispuesto para toda buen a obra”.

 LA SOBERANIA DE DIOS EN RELACION CON LA FE DEL HOMBRE
Con todo y que la soberanía de Dios es tema bíblico indiscutible. Dios se ha impuesto sus propios límites porque no es un déspota ni un tirano. Si la voluntad de Dios se presentara de forma inexorable, 
entonces todo el mundo sería salvo porque la Biblia dice: “El Seńor no retarda su promesa, según algunos la tienen por tardanza, sino que es paciente para con nosotros, no queriendo que ninguno perezca, sino que todos procedan al arrepentimiento” (2°. Pedro 3:9).

Cuando una persona exagera esta cualidad de Dios olvidando que Dios mismo ha establecido “reglas del juego” entonces cae en despropósitos como atribuirle a la voluntad de Dios todas las cosas malas que pasan en el mundo y todas las injusticias. Pero Dios se queja y dice: “Si me hubiera oído mi pueblo, si 
en mis caminos hubiera Israel andado…” (Salmos 81:11 – 12).

Y ańade:” Si quisiereis y oyereis, comeréis del bien de la tierra. Isaías 1:19.
Pero bastaría leer todo el libro de Isaías y toda la historia antigua para darnos cuenta que el hombre ha gozado de autonomía para oír o no oír la palabra de Dios y hacer o ignorar la voluntad de Dios. Es decir, que aunque la voluntad de Dios va en una dirección, la del el hombre va en otra y Dios no le impone la suya a nadie.

LA OMNIPOTENCIA DE DIOS RESPECTO A LA FE DEL HOMBRE
Las palabras y expresiones Bíblicas han de entenderse dentro del marco que la misma Biblia les impone: 
Si por definición solo Dios es omnipotente, quiere decir que no importa cuanta fe tengamos nunca seremos omnipotentes. La expresión “al que cree todo es posible”. (Marcos 9:23) ha de que entenderse bajo esta luz.

Ahondando diremos que la expresión “todo lo que pidiereis, en oración creyendo, lo recibiréis”. (Mateo 21:22) debe estar atemperada por aquella que dice. “Y esta es la confianza que tenemos en él, que si pedimos alguna cosa conforme a su voluntad, él nos oye” (1°: Juan 5:14). Por eso siempre que leamos una expresión bíblica que parezca ilimitada, en este tema o en otro, y que dependa de nosotros tiene que entenderse que el único ilimitado es Dios. Este principio fue establecido por el apóstol Pablo cuando dijo: "(1Ş Corintios 15:27). Porque todas las cosas las sujetó debajo de sus pies. 
Y cuando dice que todas las cosas han sido sujetadas a él, claramente se exceptúa aquel que sujetó a él todas las cosas. Heb. 4:2 “Porque en verdad, a nosotros se nos ha anunciado las buenas nuevas, como también a ellos. 

Pero la palabra que ellos oyeron no les aprovechó por no ir acompańada (mezclada) por la fe en los que la oyeron. 
(Rom 11:19 - 20) “Dirás entonces: "Las ramas fueron desgajadas para que yo fuera injertado." 
Muy cierto. Fueron desgajadas por (falta de fe) su incredulidad, pero tú por la fe te mantienes firme. No seas altanero, sino teme; Rom 10:16-17 Pero no todos obedecen al Evangelio; pues Isaías dice: Seńor, żquién ha creído a nuestro anuncio? Luego la fe es por el oír; y el oído, por la palabra del Cristo.Como hemos dicho la fe es un instrumento por medio 
del cual o a través del cual el ser humano puede alcanzar algunos objetivos. Por ejemplo la fe no "mueve montańas"; pero se pueden mover las montańas "por medio de la fe": ˇDios mueve las montańas! 

La expresión: "por medio de la fe" es muy común en las epístolas del apóstol Pablo.Todas las obras milagrosas o de alguna manera extraordinarias, el hombre las consigue creyendo, es decir, por medio de la fe él consigue que Dios le 
conceda sus peticiones.

LA FE DEL HOMBRE RESPECTO A LA DOCTRINA DE LA PREDESTINACIÓN

Si suponemos que solo tienen fe aquellos a quienes les fue dada, entonces solo podrán ser salvos los escogidos para tal fin. Si aceptaremos que la fe ha sido concedida a unos y otros no y que por lo tanto aquellos a quienes no les fue concedida están irremisiblemente condenados a hacer el mal sin que medie su voluntad, tendríamos que negar media biblia.

Por ejemplo: Tenemos el caso de la conversación de Caín con Dios en Génesis. Dios le pregunta a Caín żPor qué te has ensańado, y por qué ha decaído tu semblante? Si bien hicieres, żno serás enaltecido? Y si no hicieres bien, el pecado está a la puerta; con todo esto a ti será su deseo, y tú te enseńorearás de él.
En otras palabras: era cuestión de Caín que el mal lo dominara o no. Es imposible suponer que Dios le mentiría a Caín diciéndole que él podía tomar una decisión en la dirección que quisiera cuando El sabia, si fuera cierta la predestinación, que eso no era posible. (Génesis 4:6 – 7).

En Romanos encontramos otra escritura que muestra la decisión soberana del hombre para servir al mal o al bien: Romanos 6:16: "żNo sabéis que si os sometéis a alguien como esclavos para obedecerle, sois esclavos de aquel a quien obedecéis, sea del pecado para muerte, o sea de la obediencia para justicia?" 

Cuando en la carta a los Efesios se dice: "Porque por gracia sois salvos por medio de la fe; y esto no de vosotros, pues es don de Dios;" No hace referencia a la fe sino a la salvación. (Ustedes no se salvaron a 
ustedes mismos: es un regalo de Dios). Deuteronomio 30:19 "A los cielos y a la tierra llamo por testigos hoy contra vosotros, que os he puesto delante la vida y la muerte, la bendición y la maldición; escoge, pues, la vida, para que vivas tú y tu descendencia;”
Versos como los consignados en Romanos 9 a partir del verso 10 donde se está subrayando la soberanía de Dios para la elección y no para la salvación y donde Dios defiende su libertad de hacer “si así fuera”.

Como traduce J.B. Phillips: "żNo ha soportado Dios con mucha paciencia aquellos vasos que eran dignos de destrucción". La actitud de Dios puede ser traducida “a Jacob preferí y a Esaú rechacé". Es decir, Dios tuvo misericordia de los que de todos modos merecían destrucción.

Pero definitivamente no estamos obligados a ser “vasos de deshonra” porque la Biblia dice: "Así que, si alguno se limpia de Estas cosas, será instrumento para honra, santificado, útil al Seńor, y dispuesto para toda buen a obra”. N. N. 2°. Timoteo 2:20 – 21.

La fe y la obediencia están emparentadas. Cuando un hombre deposita confianza en otro, o en Dios en este caso, entonces está en el camino que posibilita la obediencia. Para obedecer es preciso que el que recibe la orden este plenamente seguro que el que la da no es “un aprovechado”. El que piensa que el ordenante busca el bien del ordenado no tiene problemas en llevar a cabo la orden. Cuando uno está plenamente convencido de la capacidad del que ordena para hacer lo que promete, entonces no hay conflicto, pues de hecho considera que el que da la orden esta investido de la autoridad que lo acredita para dar la orden, en este caso la obediencia adquiere visos de naturalidad.

Tener fe en Dios y saberlo soberano, bueno y todopoderoso nos llevará a acatarlo porque él es Dios y no hay otro fuera de Él, Porque él nos amó tanto que no dudamos de su bondad para con nosotros.
La verdadera obediencia está fundada en la autoridad moral que le reconocemos al que nos invita a confiar. Puede ser el Doctor, nuestro padre, el pastor o Dios. Él sabe lo que dice, él sabe lo que hace.

“Porque yo sé a quién he creído, y estoy seguro que es poderoso para guardar mi depósito para aquel día” 2° Timoteo: 1:12. 

LA JUSTIFICACIÓN POR MEDIO DE LA FE
En el capítulo 5 de Romanos encontramos la afirmación “justificados, pues, por la fe”. Pero para encontrarle el sentido a este verso es preciso leer el capítulo 4 donde se nos dice que a Abraham la fe le fue contada por justicia y que no solo a él sino también a nosotros que hemos creído en aquel que levanto a Cristo de entre los muertos. Aquí se nos aclara que no somos justificados por el hecho de tener fe sino de tenerla en el generador de un hecho trascendental “El que resucito a Cristo de entre los muertos”.

En este punto es donde salta a la vista la diferencia entre el concepto de fe de los orientales y el cristiano. Nosotros no conseguimos las cosas solo porque estamos convencidos, sino porque Aquel en quien creemos es capaz de hacer todas las cosas que le pedimos. Nosotros creemos y el hace todo las 
cosas: “yo lo haré” Juan 14:14, afirmó Jesús.

Quien salva y justifica es Cristo, no es la fe. La fe es solo el instrumento o el medio que Dios utiliza para que podamos recibir la salvación. En consecuencia, ya que hemos sido justificados mediante la fe ahora que Dios nos ha declarado justos por haber creído en sus promesas, podemos disfrutar 
de verdadera paz con él, merced a lo que nuestro Seńor Jesucristo hizo en nuestro favor.

LA FE COMO FRUTO DEL ESPÍRITU SANTO.

La fe como fruto del Espíritu hace referencia a la fidelidad del creyente, y esa fidelidad es en relación de nosotros hacia Dios. Gálatas 5:22 y 23. El fruto del Espíritu, es del Espíritu, nace del Espíritu, lo produce el Espíritu; no es el fruto del cristiano (Juan 15:1-2). 

El fruto del Espíritu Santo es el carácter de Cristo reflejado en la vida del creyente. La fe como esa “seguridad y confianza en”, es esencial para acercarse a Dios (Hb 11:6) y es necesaria para recibir la salvación., y en su forma activa: “fidelidad”, se requiere para permanecer salvo.

FE COMO DON DEL ESPIRITU SANTO 
1 corintios 12:9 y 13:2 Este tipo de fe es extraordinaria, porque es un don del Espíritu Santo y es diferente a la fe como instrumento para recibir la gracia y a la fe como fruto del Espíritu. Cuando Dios actúa en el creyente con este precioso don, este puede obrar y recibir milagros (Juan 14:12). 
Los dones del Espíritu Santo están repartidos en tres grupos, de revelación, de poder y de expresión. El don de fe pertenece al grupo de los dones de poder que son para actuar. Esta fe es que se usa para servicio de los demás.

LA FE EN CRISTO COMO MEDIO PARA SER SALVO

No se debe entender la fe como un fin sino como un medio para llegar a ser salvo. No es la fe en la fe, es la fe en Cristo. (Ef. 2:8). Lo importante no es sencillamente que el hombre sea un creyente, porque puede serlo de muchas maneras y tener su fe o creencia direccionada a otros sujetos o cosas. La fe es genuina, y se convierte en canal a través del cual se recibe la gracia, cuando es la fe de Jesús.

ATRIBUTOS O CARACTERÍSTICAS DE LA FE EN CRISTO.
Es direccionada por el oír. “La fe viene por el oír y el oír por la palabra de Dios” (Romanos 10:17). La fe como doctrina cristiana es de los que creen. Y para que seamos librados de hombres perversos y malos; porque no es de todos la fe (2 Tesalonicenses 3:2).

La fe como creencia en Dios es personal. żTienes tu Fe? Tenla para contigo delante de Dios. “Bienaventurado el que no se condena a sí mismo en lo que aprueba” (Romanos 14:22). La fe como creencia es para utilizarla. “Pero pida con fe, no dudando nada; porque el que duda es semejante a la onda del mar, que es arrastrada por el viento y echada de una parte a otra” (Santiago 1:6).

La fe produce Esperanza. “Por quien también tenemos entrada por la fe a esta gracia en la cual estamos firmes, y nos gloriamos en la esperanza de la gloria de Dios” (Romanos 5:2). La fe es probada. “Para que sometida a prueba vuestra fe, mucho más preciosa que el oro, el cual aunque perecedero se prueba con oro, sea hallada en alabanza, gloria y honra cuando sea manifestado Jesucristo”.(1 Pedro 1:7).“Sabiendo que la prueba de vuestra fe produce paciencia. Mas tenga la paciencia su obra completa, para que seáis perfectos y cabales, sin que os falte cosa alguna”. (Santiago 1:3).

EXPERIENCIAS DE LA FE EN DIOS.
La fe en el camino del Seńor no se adquiere de un momento a otro, ella tiene su desarrollo; estando sin el conocimiento de Dios no había absolutamente nada de fe en Jesús, pero con el llamado a seguirle, Dios inicio una obra extraordinaria a través de su palabra orientando la capacidad de creer del hombre y direccionándola a la fe en Jesús, ya que para poder entender y tener una vida de triunfos espirituales es imprescindible la fe porque como dice la escritura “Pero sin fe es imposible agradar a Dios […]” (Hebreos 11:6). 

Sin FE.
Pero sin fe es imposible agradar a Dios; porque es necesario que el que se acerca a Dios crea que le hay, y que es galardonador de los que le buscan (Hebreos 11:6).

Poca FE
“Al momento Jesús, extendiendo la mano, asió de él, y le dijo: ˇHombre de poca fe! żPor qué dudaste?” (Mateo 14:31). “Jesús les dijo: Por vuestra poca fe; porque de cierto os digo, que si tuviereis fe como un grano de mostaza, diréis a este monte: Pásate de aquí allá, y se pasará; y nada os será imposible”. (Mateo 17:20; 6:30; 8:26; 16:8; Lucas 12:28).

Tanta Fe
“Al oírlo Jesús, se maravilló, y dijo a los que le seguían: De cierto os digo, que ni aun en Israel he hallado tantafe” (Mateo 8:10).

Preciosa Fe
“Para que sometida a prueba vuestra fe, mucho más preciosaque el oro” (1 Pedro 1:7).

Ricos en Fe
“Hermanos míos amados, oíd: żNo ha elegido Dios a los pobres de este mundo, para que sean ricos en fe
y herederos del reino que ha prometido a los que le aman?” (Santiago 2:5).

Lleno de Fe
“Agradó la propuesta a toda la multitud; y eligieron a Esteban, varón lleno de fe y del Espíritu Santo […]”(Hechos 6:5).

Perfecta Fe
“Puedes ver que, en el caso de Abraham, su fe se demostró con hechos, y que por sus hechos llegó a ser perfecta su fe”.(Santiago. 2:22)

titulo:"LA GRACIA DE DIOS",

contenido:`
Hechos 20:24

“Pero de ninguna cosa hago caso, ni estimo preciosa mi vida para mí mismo, con tal que acabe mi carrera con gozo, y el ministerio que recibí del Seńor Jesús, para dar testimonio del evangelio de la gracia de Dios.”

Pablo establece que el origen de su ministerio es Dios y el propósito del ministerio es dar testimonio del evangelio de la gracia de Dios.

żQUÉ ES LA GRACIA DE DIOS?

La revelación suprema de la gracia de Dios se halla en Jesucristo, en su manifestación en carne, su ministerio y su sacrificio. La gracia es el favor inmerecido por el cual Dios salva al hombre, La Gracia es un favor inmerecido, que Dios por su misericordia otorga a los hombres. Algunos piensan que la Gracia sólo es del Nuevo Pacto, pero ella ha sido siempre el método que Dios ha usado para alcanzar al hombre desde el principio de los siglos. (Génesis 6:8; 18:3; Éxodo 34:8-9).
La Gracia es aquella perfección de Dios en virtud de la cual El demuestra su favor hacia los hombres, favor inmerecido y hasta malogrado por ellos. No obstante, esta gracia única de Dios, se manifiesta en dones y operaciones diferentes, la más rica manifestación de ella se ve en aquellas
operaciones bondadosas de Dios que tienden a, y resultan en, la remoción de la culpa, de la corrupción, del castigo del pecado y en la salvación final de los pecadores. Pero aunque esta sea la obra cumbre de la Gracia de Dios, no es su única manifestación.

La Gracia consiste en que Dios buscó a su enemigo. Mientras el hombre no sea reconciliado por el sacrificio del calvario, será un enemigo de Dios. La Gracia no solamente nos salva; (porque salvar es librar de un estado o situación, como nos explica Tito 3:3-7; Romanos 5:1-2), también hace que tengamos a Dios a favor nuestro.

La Gracia es la provisión abundante de amor que Dios hace para aquellos que confían en Él; esa provisión infinita de amor incluye la regeneración o el don de la vida eterna, la cual es mucho más que una sola restauración a la vida que se había perdido. Es la bondad de Dios nuestro Salvador y su amor para con los hombres. “No por obras de justicia que nosotros hubiéramos hecho, sino por su misericordia…”. (Tito 3:4,5; Ex. 22:27, 33:19, Neh. 9:17),
 (1ş Pedro 5:10).

La revelación suprema de la gracia de Dios se halla en su manifestación en carne, el ministerio y  sacrificio propiciatorio del Seńor Jesucristo. Dios siempre ha tenido misericordia Más la misericordia de Jehová es desde la eternidad y hasta la eternidad sobre los que le temen, Y su justicia sobre los hijos de los hijos; Sobre los que guardan su pacto, Y los que se acuerdan de sus mandamientos para ponerlos por obra.
(Salmo 103: 17-18) Dios no suministra el castigo que el hombre se merece, el hombre no fue al infierno porque Dios tuvo misericordia de él; en cambio, proveyó todos los medios para que fuera salvo, esa es la gracia. La misericordia está implícita contenida en la gracia.
(Efesios 2:4 - 5) "Pero Dios, que es rico en misericordia, por su gran amor con que nos amó, aun estando nosotros muertos en pecados, nos dio vida juntamente con Cristo por gracia sois salvos".

ORIGEN DE LA GRACIA.
La gracia es la expresión del sentimiento esencial de Dios. “Él es el Dios de toda gracia; Él es el dador de la gracia; El trono de Dios es el trono de la gracia; El Espíritu Santo es el Espíritu de gracia” 1Ş Pedro 5:10, Salmo 84:11, Hebreos 4:16, Hebreos 10:29, Zacarías 12:10.

La gracia vino por medio del Seńor Jesucristo, Él es el medio para alcanzar la gracia, y es quien la provee. Esta riqueza se manifiesta en la bondad de Dios por medio de Jesucristo, pues la gloria de la gracia se manifiesta en que somos aceptados en Cristo. Juan. 1:17, Romanos 5:15, 1Ş Corintios 1:4, Efesios 2:7, Efesios 1:6.


DISPENSACIÓN DE LA GRACIA.
El Seńor Jesucristo es el medio para alcanzar la gracia, pues cuando la trae se introduce una nueva dispensación que comienza con la muerte y resurrección de Cristo; Romanos 3:24,26, se define Como: “Las abundantes riquezas de su gracia en su bondad para con nosotros en Cristo Jesús” 
Romanos 4:24,25, y como don de Dios, “No por obras, para que nadie se gloríe” Efesios 2:9. 

Estamos en la Dispensación de la gracia. La ley por medio de Moisés fue dada, pero la gracia y la verdad vinieron por medio de JESUCRISTO. Esta dispensación terminará con el arrebatamiento de la iglesia.

CÓMO PARTICIPA EL CREYENTE DE LA GRACIA DE DIOS.
No todo miembro de la raza humana llega a participar de la gracia. Se establece claramente que todo hombre debe cumplir con una condición y no todo hombre la satisface. “En el mundo estaba y el mundo no le conoció”. Juan 1:10 Como el mundo no conoce, la gracia no puede reinar en él para vida 
eterna. “Porque esta es la vida eterna: que te conozcan a ti el único Dios verdadero y a Jesucristo a quien has enviado” Juan 17:3.

El mundo puede aceptar cantidad de cosas. “A lo suyo vino y los suyos no le recibieron más a todos los que le recibieron a los que creen en su nombre les dio potestad de ser hechos hijos de Dios” Juan1:11,12. Aunque Él fue desconocido por el mundo y rechazado por los suyos, hubo muchos que si le recibieron. A éstos, les dio potestad de llegar a ser, no hombres de reputación perfecta como lo exigía la ley, sino algo más grandioso, y sublime, les dio potestad de ser hechos hijos de Dios. El hombre que recibe a Dios en su vida es hecho una nueva criatura, tan nueva y distinta de las demás, como lo era Adán cuando fue creado.

Es de gran importancia reconocer que el Seńor Jesucristo debe ser recibido como la gracia y la verdad y a Él lo reciben los que creen en su nombre. “Abraham no dudó de la promesa de Dios sino que se fortaleció en fe plenamente convencido que era también poderoso para hacer todo lo que había prometido” Romanos 4:20,21. 

El creer en su nombre, es la respuesta del hombre a la gracia. Esto lo que hace posible que Dios obre con su gracia, es de fe para que sea de gracia.Romanos 4:16.

Todo lo que el creyente es, lo es por la gracia de Dios. “Pero por la gracia de Dios soy lo que soy; y su gracia no ha sido en vano para conmigo, antes he trabajado más que todos ellos; pero no yo, sino la gracia de Dios conmigo” (1Ş Corintios 15:10). La gracia de Dios es suficiente en medio de todas 
las necesidades. “Y me ha dicho: Bástate mi gracia; porque mi poder se perfecciona en la debilidad. Por tanto, de buena gana me gloriaré más bien en mis debilidades, para que repose sobre mí el poder de Cristo”.2Ş Corintios 12:9.

El hombre ha sido beneficiado por el favor o regalo de Dios, al cual se llama GRACIA, a través del cual, Dios ha rescatado al hombre y lo ha capacitado para una vida nueva.
El favor de Dios llegó no porque el hombre lo mereciera, sino porque Dios es grande en misericordia, y a Él le plació dar ese regalo inmerecido; es por ello que la biblia dice: “Por gracia sois salvos, por medio de la fe; y esto no de vosotros pues es don de Dios” Efesios 2-8.

La gracia de Dios llegó para proveer al hombre salvación, pero el requisito fundamental para acceder a ella, es renunciar al pecado. “Porque la gracia de Dios se ha manifestado para salvación a todos los hombres, enseńando que renunciando a la impiedad y a los deseos mundanos vivamos en este siglo sobria, justa y piadosamente¨Tito 2:11 y 12.

ENTENDAMOS Y APLIQUEMOS LA GRACIA.
Pero żCómo entendemos la gracia, cómo la predicamos, cómo la aplicamos en la vida práctica? Es cierto que en la medida en que entendamos la gravedad del pecado, de esa misma manera podemos dimensionar la grandeza de la gracia.
La gravedad del pecado de Adán fue un acto voluntario que sólo tenía una solución: Adán debía morir porque la paga del pecado es muerte. La alternativa fue que Adán muriera por sustitución.
Solo así se comprende la oración de Jesús en Getsemaní: “Padre, si es posible pasa de mi esta copa…” Pero no era posible: Tenia que morir el postrer Adán. Por lo tanto la muerte de Jesús era inevitable, y solo la de Él, porque sólo El tenia poder para poner su vida y para volverla a tomar.

Nos debe quedar claro que el pecado de Adán no tenía otra solución porque de haber sido posible Dios lo hubiera perdonado para que su Hijo no tuviera que morir. La muerte de Jesús, además, tenía que ser cruenta porque sin derramamiento de sangre no se hace remisión de los pecados.Hebreos 9:22 Dios solucionó este asunto, al hacerse hombre: 

"Padre, si es posible, pasa de mí esta copa". Esto no fue posible. Y lo hizo porque quiso, ya que pudo haberse escapado: “yo para esto he venido.” Entonces no queda duda que la redención del ser humano es asunto exclusivamente de Dios. El hombre no hizo, ni podía, hacer algo que resolviera su 
situación. Tuvo cuatro mil ańos para aceptar la imposibilidad de resolver el dilema: “Miserable hombre de mi żQuién me librará de este cuerpo de Muerte?"

EL EVANGELIO DE LA GRACIA.

Como dijimos al principio, somos predicadores del evangelio de la gracia de Dios, y surge la pregunta: żQué es el evangelio? Esta pregunta ha sido hecha en diferentes foros, con respuestas que si bien son bíblicas se han de armonizar con otros textos. Primera de Corintios 15, 1- 4, define qué es el evangelio:
1: Además os declaro, hermanos, el evangelio que os he predicado, el cual también recibisteis, en el cual también perseveráis;
2: por el cual asimismo, si retenéis la palabra que os he predicado, sois salvos, si no creísteis en vano.
3: Porque primeramente os he enseńado lo que asimismo recibí: Que Cristo murió por nuestros pecados, conforme a las Escrituras;

4: y que fue sepultado, y que resucitó al tercer día, conforme a las Escrituras; 

Y Romanos 1 lo confirma:
1: Pablo, siervo de Jesucristo, llamado a ser apóstol, apartado para el evangelio de Dios,
2: que él había prometido antes por sus profetas en las santas Escrituras,
3 acerca de su Hijo, nuestro Seńor Jesucristo, que era del linaje de David según la carne,
4 que fue declarado Hijo de Dios con poder, según el Espíritu de santidad, por la resurrección de entre los muertos,Estamos de acuerdo en que la gracia vino por medio del Seńor Jesucristo.

Él es el medio para alcanzar la gracia y es quien la provee; esta riqueza se manifiesta en la bondad de Dios por medio de Jesucristo, pues la gloria de la gracia se manifiesta en que somos aceptados en Cristo. Juan. 1:17 Romanos 5:15: “Pero el don no fue como la transgresión; “Porque si por la transgresión de aquel uno murieron los muchos, abundaron mucho más para los muchos la gracia y el don de Dios por la gracia de un hombre, Jesucristo.” 1Ş Corintios 1:4: “Gracias doy a mi Dios siempre por vosotros, por la graciade Dios que os fue dada en Cristo Jesús.

Efesios 2: 4-7: “Pero Dios, que es rico en misericordia, por su gran amor con que nos amó, 5 aun estando nosotros muertos en pecados, nos dio vida juntamente con Cristo por gracia sois salvos, 6 y juntamente con él nos resucitó, y asimismo nos hizo sentar en los lugares celestiales con Cristo Jesús, 7 para mostrar en los siglos venideros las abundantes riquezas de su gracia en su bondad para con nosotros en Cristo Jesús.”

POSICIONES EQUIVOCADAS ACERCA DE LA GRACIA

1: El cristiano debe guardarse en la graciay el amor de Dios si desea conservar su salvación. Sin embargo, se pueden adoptar equivocadamente algunas posiciones que afectan la doctrina de la gracia.
La Esclavitud De La Voluntad. Algunos consideran que el hombre nace totalmente depravado, y por lo tanto, no puede, ni creer ni tener el deseo decreer. No tiene libre albedrío. Esta postura asevera que la fe y la voluntad son impuestas por Dios al hombre, el cual es un elemento pasivo en la obra de la salvación. 
żSe recibe vida espiritual para creer? Ó żO cree para recibir vida espiritual? Por gracia sois salvos por medio de la fe Si quisieres y oyereis comeréis el pan de la tierra Isaías 1:19. El que quiera hacer la voluntad de Dios conocerá si la doctrina es de Dios o si yo hablo por mi propia cuenta. Juan 7:17 Quieres ser sano. Juan 5:6 El que hace la voluntad de Dios ese es mi hermano, hermana y madre. Marcos 3:35. 

2: La Elección Incondicional:
Basarnos en Romanos 9; para decir que Dios elige individuos para ser salvos y a otros para perderse, tomando como modelo a Isaac en lugar de Ismael, a Jacob en lugar de Esaú, etc. no es pertinente; Pablo no habla de elección para salvación, sino de la elección del pueblo mesiánico. No tenía que ver con la salvación personal de Isaac y de Jacob. Dios no predestinó a Ismael y a Esaú a la perdición antes de ellos nacer. El argumento tiene que ver con la elección de los gentiles. 

Esta creencia contradice Hechos. 10:34 y 35:
34: Entonces Pedro, abriendo la boca, dijo: En verdad comprendo que Dios no hace acepción de personas, 35 sino que en toda nación se agrada del que le teme y hace justicia.

Romanos 2:11: “porque no hay acepción de personas para con Dios.”

żCuál es el don de Efesios 2:8? "por gracia sois salvos por medio de la fe; y esto no de vosotros, pues es don de Dios" (la palabra "esto" se refiere a la salvación ("sois salvos"), pero dicen que "esto" se refiere a la fe misma; es decir, que la fe es un don de Dios. żPor qué dicen esto? Para quitar lo condicional del evangelio. Dios lo hace todo y el hombre es un elemento pasivo. Si la palabra 'fe" se refiere al creer del individuo, 
entonces la salvación no es incondicional y, desde luego, la palabra "fe" en este texto sí quiere decir "creer".

3: La Expiación Limitada.- Esta postura teológica expresa que Cristo no murió por todos, sino solamente por los "elegidos". Se afirma que no es posible que Cristo hubiera sufrido en vano. Es la posición acerca de la soberanía de Dios, según la cual el hombre no puede decir que "no" a Dios, que no 
puede rechazarlo. Esta creencia contradice 2 Corintios 5:14. Porque el amor de Cristo nos constrińe, pensando esto: que si uno murió por todos, luego todos murieron; 15 y por todos murió, para que los que viven, ya no vivan para sí, sino para aquel que murió y resucitó por ellos.
1Ş Juan. 2:2. “Y él es la propiciación por nuestros pecados; y no solamente por los nuestros, sino también por los de todo el mundo.” Cristo murió por todos. Todos compareceremos ante Cristo que murió por todos. El hombre puede rechazar la salvación que Cristo ofrece, pero el hombre no puede rechazar la ira de Dios en el Día Final.

La Gracia Irresistible.- Quienes aseguran tal concepto ponen al hombre en la condición de un robot, a quien solo le corresponde hacer la voluntad del que lo hizo. La gracia de Dios sí puede resistirse. La mayoría de los hombres lo hacen. La gracia de Dios puede ser:

-Recibida en vano, 2 Cor. 6:1. “Así, pues, nosotros, como colaboradores suyos, os exhortamos también a que no recibáis en vano la gracia de Dios.”
-Desechada, Gál. 2:21. “No desecho la gracia de Dios; pues si por la ley fuese la justicia, entonces por demás murió CRISTO.”

-Convertida en libertinaje, Judas 4. “Porque algunos hombres han entrado encubiertamente, los que desde antes habían sido destinados para esta condenación, hombres impíos, que convierten en libertinaje la gracia de nuestro Dios, y niegan a Dios el único soberano, y a nuestro Seńor Jesucristo. No es irresistible.”

SE PUEDE CAER DE LA GRACIA.
Gálatas 5:1-7 "Estad, pues, firmes en la libertad con que Cristo nos hizo libres, y no estéis otra vez sujetos al yugo de 
esclavitud. He aquí, yo Pablo os digo que si os circuncidáis, de nada os aprovechará Cristo. Y otra vez testifico a todo hombre que se circuncida, que está obligado a guardar toda la ley. De Cristo os desligasteis, los que por la ley os justificáis; de la gracia habéis caído. Pues nosotros por el Espíritu aguardamos por fe la esperanza de la justicia; porque en Cristo Jesús ni la circuncisión vale algo, ni la incircuncisión, sino la fe que obra por el amor. Vosotros corríais bien; żquién os estorbó para no obedecer a la verdad?

SE PUEDE DEJAR DE ALCANZAR LA GRACIADE DIOS.
Heb.12:15-16 Mirad bien, no sea que alguno deje de alcanzar la gracia de Dios; que brotando alguna raíz de amargura, os estorbe, y por ella muchos sean contaminados; no sea que haya algún fornicario, o profano, como Esaú, que por una sola comida vendió su primogenitura.

LA PERSEVERANCIA DE LOS SANTOS.
Dios quiere que todos perseveremos, pero nadie es forzado a hacerlo. La voluntad del hombre queda libre antes y después de la conversión. 
El concepto sobre "la perseverancia absoluta" dice: Dios llama irresistiblemente a los elegidos, y los guarda en su gracia hasta el fin, y ni una sola persona se perderá. Hechos 13:43: Y despedida la congregación, muchos de los judíos y de los prosélitos piadosos siguieron a Pablo y a Bernabé, quienes hablándoles, les persuadían a que perseverasen en la GRACIA de 
Dios.Todos pueden caer: Hebreos.10:26-31; Porque si pecáremos voluntariamente después de haber recibido el conocimiento de la verdad, ya no queda más sacrificio por los pecados,27 sino una horrenda expectación de juicio, y de hervor de fuego que ha de devorar a los adversarios. 2 Pedro 2:20. “Ciertamente, si habiéndose ellos escapado de las contaminaciones del mundo, por el conocimiento del Seńor y Salvador Jesucristo, enredándose otra vez en ellas son vencidos, su postrer estado viene a ser peor que el primero.”

APLICACIÓN: EFECTOS DE LA GRACIA.
No se puede tomar la gracia de Dios como la facultad para vivir una vida cristiana surtida de impiedades; en la gracia de Dios, mediante la regeneración, no solo Dios nos hace sus hijos, sino que también nos habilita para vivir una vida en victoria. Juan 10:10 El ladrón no viene sino para hurtar y matar y destruir; yo he venido para que tengan vida, y para que la tengan en abundancia.
 
No es la gracia en medio del pecado, es la gracia que aleja al hombre del pecado.Tito 2:11-15. Porque la gracia de Dios se ha manifestado para salvación a todos los hombres, enseńándonos que, renunciando a la impiedad y a los deseos mundanos, vivamos en este siglo sobria, justa 
y piadosamente, aguardando la esperanza bienaventurada y la manifestación gloriosa de nuestro gran Dios y Salvador Jesucristo, quien se dio a sí mismo por nosotros para redimirnos de toda iniquidad y purificar para sí un pueblo propio, celoso de buenas obras. Esto habla, y exhorta y reprende con toda autoridad. Nadie te menosprecie.De manera pues, que la manifestación de la gracia de Dios es para salvación; es decir, tiene como efecto práctico el librarnos de la condenación eterna.

Los efectos de la gracia pueden sintetizarse en: 
·La gracia es un compendio de enseńanzas. 
.Cuanta enseńanza hay en las palabras de CRISTO
· El perdón produce una gratitud transformadora.

El evangelio de la gracia nos enseńa a renunciar a la impiedad. El hijo adoptado y regenerado se despoja de sus harapos, todo lo pecaminoso, lo sucio, lo impuro, lo cruel, lo opuesto a Dios. Hoy se ve el fruto del Espíritu en los regenerados. Son los milagros del siglo 21. 
·Arenunciar a los deseos mundanos
·Atener una vida equilibrada, sin exageraciones, lo cual es una tendencia de la carne, dispuesta a cegarse por el dinero, la fama y el poder.
.Una vida justa aplicando un solo artículo: "lo que quieran que los hombres hagan con ustedes, así hagan ustedes con ellos.
·A tener como objetivo de esta vida cristiana, aquella esperanza bienaventurada
·Dios ha tenido este deseo para con sus redimidos, un pueblo propio, doblemente propio, por creación 
y por redención. Esto último como resultado de su gracia
·A ser un pueblo celoso de buenas obras. Es lo propio de un pueblo regenerado.
·Las obras de la gracia son siempre superiores a las de la ley porque se hacen por amor. 
·Nosotros testigos de la gracia, perdonados por gracia, regenerados por su gracia, para que 
vivamos como hijos de la gracia.

1 Pedro 4:10. “Cada uno según el don que ha recibido, minístrelo a los otros, como buenos 
administradores de la multiforme gracia de Dios. Si alguno habla, hable conforme a las palabras de Dios, si alguno ministra, ministré conforme al poder que Dios da, para que en todo Dios sea glorificado por Jesucristo a quien pertenecen la gloria y el imperio por los siglos de los siglos. Amén.”
 
Pero El Dios de toda gracia, el que nos llamó a su gloria eterna en Jesucristo, después que hayamos padecido un poco de tiempo. Él mismo nos 
perfecciona, nos afirma, nos fortalece y nos establece A Él seala gloria y el imperio por los siglos de los siglos, Amén.

titulo:"LA SANTIFICACION",

contenido:`
Es la obra que el espiritu santo hace en una persona para purificarlo y separarlo del pecado haciendolo conforme a la imagen de cristo (1 corintios 6: 11) en un proceso continuo (1 corintios 1: 30)
DEFINICIÓN Y CONCEPTO
Santificación. Del hebreo hsedok, kodesh ó qadash, brillo, separar, apartar; del griego hagios ?hagios, santo, santidad, santificar, santificado, santificación. Estos vocablos se usan hoy contanta frecuencia para explicar cualidades morales y espirituales, de posición o relación, tal como
existen entre Dios y alguna persona o cosa consagrada a El.

El sentido básico de la raíz hebrea se indica diversamente como:
?colocar aparte: Este término podría subyacer a referencias a la santidad o la santificación en función de posición, estado, relación, donde las palabras se traducen cortado, separado.

?apartado para uso exclusivo, dedicado, o consagrado, considerado sagrado o santo en contraste con lo común, profano o secular.
_brillo. Este término podría subyacer a aquellos usos que se relacionan con la condición, el estado o el proceso, que en el Nuevo Testamento lleva a la idea de una transformación interior que se efectúa gradualmente, dando como resultado la pureza, la rectitud moral, y los pensamientos santos y espirituales que se expresan en una vida externa de bondad y piedad.

EN EL ANTIGUO TESTAMENTO.
Dios es Santo (Salmos 99:9) y Santo es su Nombre (Salmos 99:3; 11:9). La santidad de todas las demás cosas o personas que puedan ser llamadas santas deriva de él y depende de su voluntad.
La santidad de Dios significa que él es distinto y trascendente con relación a todo lo creado, el solo Dios viviente es Eterno, Infinito en poder, Santo en naturaleza, atributos y propósitos (Génesis 28:16; 1ş Samuel 6:19; Isaías 6; 57:15; Oseas 11:9; Ezequiel 1:36, 22-23).
Al mismo tiempo, su Santidad se expresa manifestándose, dándose a conocer, llamando al hombre a participar en lo
que él hace (Deuteronomio 7:6; Levítico 11:44; Números 15:40).

Las cosas no son santas en sí mismas, ni primordialmente por su uso en el culto, sino por estar colocadas al servicio de Dios o en relación con él. Así lo son: el lugar donde Dios se da a conocer (Éxodo 3:5; Josué 5:15), el arca del pacto (2ş Crónicas 35: 3), las vestimentas y utensilios
relacionados con el culto a Dios (Es. 28:2; 1ş Reyes 8:4), las fiestas consagradas a él (Isaías 30:29) y por supuesto el templo. Tanto los profetas como el Seńor Jesús enseńan que estas cosas son profanadas cuando se les considera aparte del propósito y la voluntad de Dios. Dios
congrega a un pueblo que por ser separado par a él, es santo (Levítico 21: 6-8; Ezequiel 37:28).

EL NUEVO TESTAMENTO.
Ve en el nuevo pueblo de Dios la continuidad del pueblo santo (Juan17:19; 1Ş Corintios 1:2; Romanos 15:16; 1Ş Pedro 2:5-8). Los miembros de este pueblo deben consagrar la totalidad de su vida en ofrenda a Dios (Romanos 12:1; Filipenses 2:17). La santidad no es privilegio de algunos ya que todos los creyentes somos llamados a vivir en santidad (2Ş Corintios 7:1).

La santidad de Dios demanda la santidad del hombre (Levítico 11:45; 1Ş P. 1:15-16). El propósito de Dios es hacer un pueblo santo (Ezequiel 19:6; 1Ş Pedro 2:9; Hebreos 12:14).

El conocimiento de Dios levanta y santifica al hombre, mientras más revelación se tenga de Dios, más santidad de Dios hay. Santo es una persona separada del mundo para el servicio de Dios (Salmos 50:5).
La santidad es interna y externa (I Corintios 6:19-20; II Corintios 7:1; I Tesalonicenses 5:23). Incluye actitudes, pensamientos, y administración espiritual, pero también incluye acciones, apariencia, y administración física. Ambos aspectos son esen-
ciales.

La vida de santidad es un esfuerzo continuo hacia la perfección (Mateo 5:48; II Corintios 7:1; Filipenses 3:12-16). Nadie es absolutamente perfecto, pero todos pueden ser relativamente perfectos y maduros. Dios espera un crecimiento continuo en la gracia y el conocimiento y una producción en aumento del fruto
espiritual (Juan 15:1-8; II Pedro 3:18). La meta diaria del Cristiano es vencer al pecado (Juan 5:14; 8:11). No debe pecar; si es que peca, puede recibir perdón por el arrepentimiento y la confesión (I Juan 1:9; 2:1).
La santidad no es un medio de ganar la salvación, sino que es un resultado de la salvación. Viene mediante la fe, Y el andar según el Espíritu.

titulo:"LA REDENCION",

contenido:`
DEFINICIÓN Y CONCEPTO
Redención: Significa liberación de algún mal mediante el pago de un precio. Es algo más que simple liberación. Rescate del griego lytron. 
El grupo de palabras basado en lytron se formó específicamente para transmitir esta idea de liberación mediante el pago de rescate. En este círculo de ideas, podemos considerar que la muerte de Cristo fue ?un rescate por muchos (Marcos 10:45).

 ALGUNOS EJEMPLOS DE REDENCIÓN
Los prisioneros de guerra podían ser liberados mediante el pago de un precio que se llama rescate.

También podían ser liberados los esclavos mediante un mecanismo de rescate. En la compra ficticia por un dios, el esclavo podía pagar el precio de su libertad al tesoro del templo, y entonces debía pagar por la solemne formalidad de ser vendido al dios para libertad.
Técnicamente, seguían siendo esclavos del dios, y en consecuencia podía asignársele alguna obligación piadosa. Pero en lo que se refería a los hombres, quedaba libre a partir de ese momento. Alternativamente el esclavo podía simplemente pagar el precio a su amo. Lo característico de ambas formas de liberación es el pago del precio del rescate ?lytron =
Redención, es el nombre que se da a este procedimiento.

Entre los hebreos podemos ver una situación diferente, bien ilustrada en (Éxodo 21:28-30). Si un hombre tenía un buey peligroso debía tenerlo guardado. Si se escapaba y corneaba a alguien de modo que le producía la muerte la ley era clara:

?el buey será apedreado y también morirá su dueńo. Pero aquí no se trata de un homicidio voluntario o elevadamente
premeditado. 
Por ello está estipulado que puede pagarse un rescate ?cofer. Podía pagar una suma de dinero y de ese modo redimir su vida prendada.
La redención efectuada por el pariente cercano (del hebreo leog ?goel (Isaías 49:24-25;
Hebreos 2:14; Gálatas 4:4), tenía que ver con personas y con una herencia (Levítico 25:48;
25:25; Efesios 1: 7, 11,14).
El Redentor debe ser un pariente cercano (Rut 3:12,13; Gálatas 4:4-5; Hebreos 2:14,15).

El Redentor debe ser capaz de redimir (Rut 4:4-6; Jeremías 50:34; Juan 10:11,18).

La redención se efectúa cuando el ?goel? paga de una manera completa lo que justamente se
demanda (Levítico 25:27; 1Ş Pedro 1:18, 19; Gálatas 3:13; Éxodo 14:30; Romanos 3:24).

Otros usos de rescate en la antigüedad se refieren a la redención de la propiedad, etc.; pero los
que hemos detallado son los más importantes. Tienen en común la idea de una libertad asegurada
mediante el pago de un precio. El pago de un precio para obtener la libertad es lo fundamental y
característico.
Esto es lo que hace tan útil el concepto para los cristianos primitivos. Jesús le había dicho que todo aquel que hace pecado, esclavo es del pecado (Juan 8:34). 
Consecuentemente, Pablo se considera ?carnal, vendido al pecado (Romanos 7:14), vendido como bajo un cruel amo de
esclavos. A los romanos les recuerda que en épocas pasadas ellos también habían sido ?esclavos

del pecado (Romanos 6:17). Desde un punto de vista diferente, los hombres fueron condenados a muerte, porque la paga del pecado es muerte (Romanos 6:23). Los pecadores son esclavos, están condenados a morir, cualquiera sea el concepto que adoptemos, el mundo antiguo había considerado que la situación era tal que se hacía necesaria la redención. De no ser así, la esclavitud continuaría y tendría que llevarse a cabo la sentencia de muerte. Contra ese transfundo se manifiesta Cristo. La muerte de Cristo en la Cruz es el precio pagado para liberar a los esclavos y poner en libertad al condenado.

La voz característica neotestamentaria y hebrea referida a la Redención es apolytrosis, palabra poco usada en otras partes, comparativamente. La encontramos 10 veces en el Nuevo Testamento pero aparentemente sólo 8 veces aparece en el resto de la literatura griega. Es posible que esto indique la convicción de los cristianos primitivos de que la Redención lograda por Jesucristo fue única. No significa como algunos han querido verlo, que entiendan que la redención no era más que ?liberación. Para esto último empleaban términos como rhyomai, ?rescate.

Apolytrosis significa liberación mediante el pago de un precio, que en este caso fue la muerte
expiatoria del Salvador. Cuando leemos a cerca de ?Redención por su Sangre (Efesios 1:7),
evidentemente se entiende que la Sangre de Cristo es el precio de la redención.

Lo mismo ocurre con (Romanos 3:24) ?siendo justificados gratuitamente por su Gracia, mediante la
redención que es en Cristo Jesús, a quien Dios puso como propiciación por medio de la fe en su
Sangre. Aquí Pablo se vale de tres metáforas, la del tribunal de justicia, la de los sacrificios, y la
de la manumisión (acción de liberar a un esclavo). A nosotros nos interesa la última. Pablo ve un
mecanismo de liberación, pero mediante el pago de un precio, la Sangre de Cristo.

También en (Hebreos 9:15) la Redención está realizada con la muerte de Cristo. Además, a veces
parece la mención de precio, pero no de redención, como en las referencias al haber sido
?comprados por precio (1Ş Corintios 6:19s; 7:22s). La idea básica es la misma. 
Cristo compró a los hombres mediante el precio de su Sangre. En (Gálatas 3:13) el precio de la redención se
expresa con las palabras ?hecho por nosotros maldición. Cristo nos redimió al tomar nuestro
lugar, al cargar con nuestra maldición. Esto nos hace ver claramente la idea de la sustitución en la
Redención, idea que a veces se destaca, como ocurre en (Marcos 10:45) ?en rescate por muchos.

La redención no sólo vuelve la mira al Calvario, sino también a la libertad de que gozan los
redimidos. ?habéis sido comprados por precio, dice Pablo, ?glorificad, pues, a Dios en vuestro
cuerpo y en vuestro espíritu (1Ş Corintios 6:20). Precisamente, porque hemos sido redimidos a
ese costo, los creyentes debemos ser hombres de Dios. Debemos mostrar en la manera de vivir
que ya no estamos sujetos al cautiverio de que hemos sido liberados, y se nos exhorta a
mantenernos, por lo tanto, ?firmes en la libertad con que Cristo nos hizo libres (Gálatas 5:1).
