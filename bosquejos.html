contenido:`
Los bosquejos de predicaciones son una herramienta de apoyo para el estudio, la enseñanza y la exposición de la Palabra de Dios. Su propósito es servir como guía para desarrollar mensajes bíblicos con orden, claridad y fundamento doctrinal.

Se recomienda leer cuidadosamente cada pasaje citado, meditar en su contenido y complementar el estudio con oración y búsqueda constante de la voluntad de Dios.

"Jehová te guardará de todo mal; él guardará tu alma." Salmos 121:7–8

Preservar = guardar, proteger y conservar conforme a la voluntad de Dios.

Introducción:
Preservar no es simplemente guardar algo físicamente; bíblicamente implica cuidar lo que Dios nos ha confiado: nuestra vida, fe, familia y relación con Él.

Salmos 121:7–8 "Jehová te guardará de todo mal; El guardará tu alma. Jehová guardará tu salida y tu entrada Desde ahora y para siempre."

Confiar en la protección de Dios aun en tiempos difíciles.

Lo que no se cuida puede debilitarse.

Dios nos confía dones y responsabilidades.

"Lo que Dios entrega, el creyente debe valorar; lo que se valora, se cuida; y lo que se cuida, se preserva."

{
titulo:"LA REDENCION",

contenido:`
DEFINICIÓN Y CONCEPTO
Redención: Significa liberación de algún mal mediante el pago de un precio. Es algo más que simple liberación. Rescate del griego lytron. 
El grupo de palabras basado en lytron se formó específicamente para transmitir esta idea de liberación mediante el pago de rescate. En este círculo de ideas, podemos considerar que la muerte de Cristo fue ?un rescate por muchos (Marcos 10:45).

 ALGUNOS EJEMPLOS DE REDENCIÓN
Los prisioneros de guerra podían ser liberados mediante el pago de un precio que se llama rescate.

También podían ser liberados los esclavos mediante un mecanismo de rescate. En la compra ficticia por un dios, el esclavo podía pagar el precio de su libertad al tesoro del templo, y entonces debía pagar por la solemne formalidad de ser vendido al dios para libertad.
Técnicamente, seguían siendo esclavos del dios, y en consecuencia podía asignársele alguna obligación piadosa. Pero en lo que se refería a los hombres, quedaba libre a partir de ese momento. Alternativamente el esclavo podía simplemente pagar el precio a su amo. Lo característico de ambas formas de liberación es el pago del precio del rescate ?lytron =
Redención, es el nombre que se da a este procedimiento.

Entre los hebreos podemos ver una situación diferente, bien ilustrada en (Éxodo 21:28-30). Si un hombre tenía un buey peligroso debía tenerlo guardado. Si se escapaba y corneaba a alguien de modo que le producía la muerte la ley era clara:

?el buey será apedreado y también morirá su dueño. Pero aquí no se trata de un homicidio voluntario o elevadamente
premeditado. 
Por ello está estipulado que puede pagarse un rescate ?cofer. Podía pagar una suma de dinero y de ese modo redimir su vida prendada.
La redención efectuada por el pariente cercano (del hebreo leog ?goel (Isaías 49:24-25;
Hebreos 2:14; Gálatas 4:4), tenía que ver con personas y con una herencia (Levítico 25:48;
25:25; Efesios 1: 7, 11,14).
El Redentor debe ser un pariente cercano (Rut 3:12,13; Gálatas 4:4-5; Hebreos 2:14,15).

El Redentor debe ser capaz de redimir (Rut 4:4-6; Jeremías 50:34; Juan 10:11,18).

La redención se efectúa cuando el ?goel? paga de una manera completa lo que justamente se
demanda (Levítico 25:27; 1ª Pedro 1:18, 19; Gálatas 3:13; Éxodo 14:30; Romanos 3:24).

Otros usos de rescate en la antigüedad se refieren a la redención de la propiedad, etc.; pero los
que hemos detallado son los más importantes. Tienen en común la idea de una libertad asegurada
mediante el pago de un precio. El pago de un precio para obtener la libertad es lo fundamental y
característico.
Esto es lo que hace tan útil el concepto para los cristianos primitivos. Jesús le había dicho que todo aquel que hace pecado, esclavo es del pecado (Juan 8:34). 
Consecuentemente, Pablo se considera ?carnal, vendido al pecado (Romanos 7:14), vendido como bajo un cruel amo de
esclavos. A los romanos les recuerda que en épocas pasadas ellos también habían sido ?esclavos

del pecado (Romanos 6:17). Desde un punto de vista diferente, los hombres fueron condenados a muerte, porque la paga del pecado es muerte (Romanos 6:23). Los pecadores son esclavos, están condenados a morir, cualquiera sea el concepto que adoptemos, el mundo antiguo había considerado que la situación era tal que se hacía necesaria la redención. De no ser así, la esclavitud continuaría y tendría que llevarse a cabo la sentencia de muerte. Contra ese transfundo se manifiesta Cristo. La muerte de Cristo en la Cruz es el precio pagado para liberar a los esclavos y poner en libertad al condenado.

La voz característica neotestamentaria y hebrea referida a la Redención es apolytrosis, palabra poco usada en otras partes, comparativamente. La encontramos 10 veces en el Nuevo Testamento pero aparentemente sólo 8 veces aparece en el resto de la literatura griega. Es posible que esto indique la convicción de los cristianos primitivos de que la Redención lograda por Jesucristo fue única. No significa como algunos han querido verlo, que entiendan que la redención no era más que ?liberación. Para esto último empleaban términos como rhyomai, ?rescate.

Apolytrosis significa liberación mediante el pago de un precio, que en este caso fue la muerte
expiatoria del Salvador. Cuando leemos a cerca de ?Redención por su Sangre (Efesios 1:7),
evidentemente se entiende que la Sangre de Cristo es el precio de la redención.

Lo mismo ocurre con (Romanos 3:24) ?siendo justificados gratuitamente por su Gracia, mediante la
redención que es en Cristo Jesús, a quien Dios puso como propiciación por medio de la fe en su
Sangre. Aquí Pablo se vale de tres metáforas, la del tribunal de justicia, la de los sacrificios, y la
de la manumisión (acción de liberar a un esclavo). A nosotros nos interesa la última. Pablo ve un
mecanismo de liberación, pero mediante el pago de un precio, la Sangre de Cristo.

También en (Hebreos 9:15) la Redención está realizada con la muerte de Cristo. Además, a veces
parece la mención de precio, pero no de redención, como en las referencias al haber sido
?comprados por precio (1ª Corintios 6:19s; 7:22s). La idea básica es la misma.

/* CAMBIAR TEMA */

function cambiarTema(tipo){

let fondo = document.querySelectorAll(".pantalla");

fondo.forEach(p=>{

    if(tipo=="claro"){
        p.style.background =
        "linear-gradient(rgba(255,255,255,0.82),rgba(255,255,255,0.82)), url('24262.jpg')";
    }

    else if(tipo=="oscuro"){
        p.style.background =
        "linear-gradient(135deg,#232526,#414345)";
    }

    else if(tipo=="azul"){
        p.style.background =
        "linear-gradient(135deg,#1e3c72,#2a5298)";
    }

    else if(tipo=="biblico"){
        p.style.background =
        "linear-gradient(135deg,#c79081,#dfa579)";
    }

    else if(tipo=="atardecer"){
        p.style.background =
        "linear-gradient(135deg,#ff7e5f,#feb47b)";
    }

    else if(tipo=="oceano"){
        p.style.background =
        "linear-gradient(135deg,#2193b0,#6dd5ed)";
    }

    else if(tipo=="bosque"){
        p.style.background =
        "linear-gradient(135deg,#134e5e,#71b280)";
    }

    else if(tipo=="morado"){
        p.style.background =
        "linear-gradient(135deg,#654ea3,#eaafc8)";
    }

    else if(tipo=="dorado"){
        p.style.background =
        "linear-gradient(135deg,#b79826,#ffd700)";
    }

    p.style.backgroundSize = "cover";
});

localStorage.setItem(
    "temaSeleccionado",
    tipo
);

document.getElementById("menuTema").style.display = "none";
}

/* MENU */

function abrirMenuTema(){

let menu =
document.getElementById("menuTema");

if(menu.style.display=="flex"){
    menu.style.display="none";
}else{
    menu.style.display="flex";
}

}

/* CARGAR TEMA GUARDADO */

window.onload = ()=>{

let temaGuardado =
localStorage.getItem(
"temaSeleccionado"
);

if(temaGuardado){
    cambiarTema(temaGuardado);
}

};
function filtrarTemas() {

let texto =
document.getElementById("busqueda")
.value.toLowerCase();

let botones =
document.querySelectorAll(".botonTema");

botones.forEach(boton => {

if (boton.innerText.toLowerCase().includes(texto)) {
boton.style.display = "block";
} else {
boton.style.display = "none";
}

});

}
